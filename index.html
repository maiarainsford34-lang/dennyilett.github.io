        <div class="section-label">Biography</div>
        <h2>A Musician's<br /><em>Musician</em></h2>
        <p>Denny Ilett is one of the UK's most versatile and accomplished musicians — a self-taught guitarist, vocalist, bandleader, composer, arranger and teacher whose musical explorations span jazz, blues, big band, swing, rock, soul, funk and psychedelia.</p>
        <p>Based in Henley-on-Thames, Oxfordshire, Denny has spent over four decades performing and recording at the highest level. He has collaborated with a remarkable range of musicians including funk legend Pee Wee Ellis, conductor Charles Hazlewood, Will Gregory (Goldfrapp), Adrian Utley (Portishead), soul artist Lewis Taylor, Paul Jones (Manfred Mann), trumpet virtuoso Bobby Shew, and celebrated New Orleans vocalist Lillian Boutté — with whom he toured globally for over two decades as musical director. He is also deeply involved in education, teaching jazz guitar privately in Berkshire and South Oxfordshire and online to students worldwide.</p>
        <p><em>"A knockout guitarist — soulful and jazz-tinged."</em><br /><span style="font-size:0.7rem;letter-spacing:0.2em;color:var(--grey)">— GUITARIST MAGAZINE</span></p>

  <!-- ELECTRIC LADY BIG BAND -->

      <!-- Ronnie's photo full width -->
      <div class="reveal" style="margin:2.5rem 0;">
        <img src="https://maiarainsford34-lang.github.io/dennyilett.github.io/images/denny2.jpg" alt="Electric Lady Big Band at Ronnie Scott's Jazz Club London — Denny Ilett's 16-piece jazz ensemble" style="width:100%;display:block;border:1px solid var(--border);" />
        <div style="padding:0.4rem 0.8rem;background:var(--card);border:1px solid var(--border);border-top:none;font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--grey);">Ronnie Scott's Jazz Club, London</div>
      </div>

      <!-- Main text full width -->
      <div class="reveal" style="max-width:800px;margin:0 auto 3.5rem;">
        <div class="elbb-body">
          <p>The Electric Lady Big Band is an acclaimed 16-piece jazz ensemble led by guitarist, vocalist and arranger Denny Ilett. Founded in 2018 to celebrate the 50th anniversary of Hendrix's masterpiece <em>Electric Ladyland</em>, the group reimagines the music of Jimi Hendrix — transforming his iconic songs and riffs into joyous, horn-laden big band arrangements that draw on jazz, psychedelia, blues, rock and funk.</p>
          <p>Featuring some of the UK's finest jazz musicians, the Electric Lady Big Band delivers a show that is both a loving homage to Hendrix's genius and a thrilling demonstration of the power and creativity of big band jazz. The band has performed at Ronnie Scott's and major UK jazz festivals, earning widespread critical acclaim and national recognition.</p>
          <p>With two albums to their name, the band continues to grow its reputation as one of the most original and exciting live acts on the UK jazz scene. A sound that has to be heard live to be fully believed.</p>
        </div>
        <div style="margin-top:2rem;display:flex;gap:1rem;flex-wrap:wrap;">
          <a href="#contact" class="btn-primary">Book the Band</a>
          <a href="https://dennyilett.bandcamp.com" target="_blank" rel="noopener" class="btn-ghost">Listen on Bandcamp</a>
        </div>
      </div>

      <!-- Details panel full width -->

            <p style="font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:300;line-height:1.9;color:rgba(240,236,228,0.85);">Available for weddings, corporate events, festivals, jazz clubs and private functions throughout the South of England — Berkshire, Oxfordshire, Hampshire, Surrey and London.</p>

          <div class="role-subtitle">Self-taught · Jazz · Blues · Rock · Soul · Funk</div>
          <div class="role-body">
            A self-taught guitarist with a voice entirely his own, Denny's playing defies easy categorisation. Guitarist Magazine called him "a knockout guitarist — soulful and jazz-tinged," and that precision captures something essential: a player whose technique serves emotion rather than the other way around.

      <p style="font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:300;line-height:1.9;color:rgba(240,236,228,0.85);margin-bottom:1.2rem;">With over 40 years of professional performing experience, Denny is a patient, inspiring and highly knowledgeable teacher. His <em>Jazz Demystification</em> approach strips away the theory and puts the music first — fretboard logic, real improvisation, and the stylistic detail that separates a jazz guitarist from someone who just knows the scales. Lessons cover jazz harmony, chord theory, improvisation, jazz standards, blues technique, fingerpicking, sight-reading, composition and arranging.</p>
      <p style="font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:300;line-height:1.9;color:rgba(240,236,228,0.85);margin-bottom:2rem;">Whether you are a complete beginner, an intermediate player looking to develop your jazz vocabulary, or an advanced musician seeking to refine your improvisation and arrangement skills, Denny tailors each lesson to your individual goals. All levels welcome — beginners through to professional players.</p>

  <script>
    // Nav scroll effect
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
      navbar.classList.toggle('scrolled', window.scrollY > 50);
    });

    // Mobile menu
    function toggleMenu() {
      document.getElementById('navLinks').classList.toggle('open');
    }
    function closeMenu() {
      document.getElementById('navLinks').classList.remove('open');
    }

    // Scroll reveal
    const reveals = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    reveals.forEach(el => observer.observe(el));

    // Contact form (placeholder — wire to Formspree or similar)
    function handleSubmit(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.textContent = 'Message Sent ✓';
      btn.style.background = '#2a7a2a';
      btn.disabled = true;
    }
  </script>
